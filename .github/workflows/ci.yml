# ============================================
# Blog2026 CI 流水线
# 触发条件: push/PR 到 master 分支
# ============================================
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ==================== 后端构建 & 测试 ====================
  backend:
    name: "后端: Java ${{ matrix.java-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17]
    defaults:
      run:
        working-directory: blog-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: 编译
        run: ./mvnw compile -B -q

      - name: 打包（跳过测试）
        run: ./mvnw package -DskipTests -B -q

      # 预留：添加测试后启用
      # - name: 测试
      #   run: ./mvnw test -B

  # ==================== 前端构建 ====================
  frontend:
    name: "前端: ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [blog-front, blog-admin]
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build

  # ==================== Docker 镜像构建验证 ====================
  docker:
    name: Docker 镜像验证
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 构建 blog-server 镜像
        run: docker build -t blog-server:test ./blog-server

      - name: 构建 nginx 镜像
        run: docker build -t blog-nginx:test -f Dockerfile.nginx .

      - name: 验证镜像存在
        run: |
          docker images | grep blog-server
          docker images | grep blog-nginx
