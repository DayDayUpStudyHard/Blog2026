[pytest]
minversion = 8.0
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    smoke: Smoke tests - core endpoints only
    public: Public APIs - no auth required
    auth: Auth-dependent APIs
    admin: Admin management APIs
    slow: Slow tests (involve DB writes)
