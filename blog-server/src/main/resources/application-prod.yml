# ============================================
# 生产环境配置（通过环境变量注入敏感信息）
# 使用方式: docker-compose up 或设置 SPRING_PROFILES_ACTIVE=prod
# ============================================
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:blog2026}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

blog:
  upload-path: ${UPLOAD_PATH:upload/}
  storage:
    type: ${STORAGE_TYPE:local}
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:auto}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      bucket: ${S3_BUCKET:}
      public-url: ${S3_PUBLIC_URL:}
