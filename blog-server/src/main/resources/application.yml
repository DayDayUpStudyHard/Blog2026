# ============================================
# Blog2026 公共配置
# 环境相关配置见 application-dev.yml / application-prod.yml
# 默认激活 dev 环境
# ============================================
server:
  port: 8080

spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: blog-token
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: tik
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn

# Actuator 监控端点（Prometheus 采集用）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

# 搜索配置
blog:
  search:
    type: ${SEARCH_TYPE:mysql}
