# ============================================
# 测试环境配置 — H2 内存数据库
# ============================================
spring:
  datasource:
    url: jdbc:h2:mem:blog2026_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  token-name: blog-token
  timeout: 604800
  is-log: false

blog:
  upload-path: upload/
  storage:
    type: local
