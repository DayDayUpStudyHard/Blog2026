# ============================================
# Blog2026 Nginx 配置
# 职责：博客前台 + 管理后台 + API 反向代理
# ============================================

upstream blog-server {
    server blog-server:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # ==================== 静态资源强缓存 ====================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==================== AI 对话 API（SSE 流式） ====================
    location /api/chat/ {
        proxy_pass http://host.docker.internal:8088/api/chat/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ==================== API 反向代理 ====================
    location /api/ {
        proxy_pass http://blog-server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ==================== 文件上传代理 ====================
    location /upload/ {
        proxy_pass http://blog-server/upload/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ==================== 管理后台 SPA ====================
    # 注意：管理后台路由 base 需设为 '/admin/'
    # 在 blog-admin/src/router/index.js 中：
    #   const router = createRouter({ history: createWebHistory('/admin/'), ... })
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # 管理后台的静态资源（由 alias 内部处理，不需要额外配置）

    # ==================== 博客前台 SPA ====================
    location / {
        root /usr/share/nginx/html/blog;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}
