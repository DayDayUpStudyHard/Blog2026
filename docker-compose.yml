version: "3.9"

# ============================================
# Blog2026 容器化部署
# 启动: docker-compose up -d
# 构建: docker-compose up -d --build
# ============================================

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: blog2026
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./blog-server/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-net

  # ==================== 后端服务 ====================
  blog-server:
    build:
      context: ./blog-server
      dockerfile: Dockerfile
    container_name: blog-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: blog2026
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      UPLOAD_PATH: /app/upload/
      STORAGE_TYPE: local
      TZ: Asia/Shanghai
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-net

  # ==================== Nginx（前端 + 反向代理）====================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - blog-server
    networks:
      - blog-net

# ==================== 持久化卷 ====================
volumes:
  mysql_data:
    name: blog_mysql_data
  redis_data:
    name: blog_redis_data
  upload_data:
    name: blog_upload_data

# ==================== 网络 ====================
networks:
  blog-net:
    name: blog-net
    driver: bridge
