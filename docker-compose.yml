version: "3.9"

# ============================================
# Blog2026 容器化部署
# 启动: docker-compose up -d
# 构建: docker-compose up -d --build
# ============================================

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: blog2026
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./blog-server/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-net

  # ==================== 后端服务 ====================
  blog-server:
    build:
      context: ./blog-server
      dockerfile: Dockerfile
    container_name: blog-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: blog2026
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ES_URIS: http://elasticsearch:9200
      SEARCH_TYPE: elasticsearch
      UPLOAD_PATH: /app/upload/
      STORAGE_TYPE: local
      TZ: Asia/Shanghai
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-net

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: blog-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - blog-net

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: blog-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - blog-net

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: blog-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./prometheus/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./prometheus/grafana-dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./prometheus/grafana-dashboard.json:/etc/grafana/dashboards/blog2026.json:ro
    depends_on:
      - prometheus
    networks:
      - blog-net

  # ==================== Nginx（前端 + 反向代理）====================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - blog-server
    networks:
      - blog-net

# ==================== 持久化卷 ====================
volumes:
  mysql_data:
    name: blog_mysql_data
  redis_data:
    name: blog_redis_data
  upload_data:
    name: blog_upload_data
  es_data:
    name: blog_es_data
  prometheus_data:
    name: blog_prometheus_data
  grafana_data:
    name: blog_grafana_data

# ==================== 网络 ====================
networks:
  blog-net:
    name: blog-net
    driver: bridge
